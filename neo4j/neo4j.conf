# Neo4j configuration for Jetson Orin Nano (8 GB RAM)
# Docs: https://neo4j.com/docs/operations-manual/current/configuration/

#---------------------------------------------------------------
# Network connectors
#---------------------------------------------------------------
server.default_listen_address=127.0.0.1

# HTTP connector (Browser UI)
server.http.enabled=true
server.http.listen_address=:7474

# Bolt connector (driver protocol)
server.bolt.enabled=true
server.bolt.listen_address=:7687

#---------------------------------------------------------------
# Memory — tuned for 8 GB total system RAM
#---------------------------------------------------------------

# JVM Heap: 512 MB initial, 1 GB max
server.memory.heap.initial_size=512m
server.memory.heap.max_size=1g

# Page cache: 512 MB (for graph data in memory)
server.memory.pagecache.size=512m

# Transaction memory limit
db.memory.transaction.total.max=256m

#---------------------------------------------------------------
# Directories
#---------------------------------------------------------------
server.directories.data=data
server.directories.logs=logs
server.directories.import=import
server.directories.plugins=plugins

#---------------------------------------------------------------
# Security
#---------------------------------------------------------------
dbms.security.auth_enabled=true
# dbms.security.procedures.unrestricted=apoc.*

#---------------------------------------------------------------
# Default database
#---------------------------------------------------------------
initial.dbms.default_database=neo4j

#---------------------------------------------------------------
# Misc
#---------------------------------------------------------------

# Allow CSV import from file:// URLs
dbms.security.allow_csv_import_from_file_urls=true

# JVM additional settings (aarch64 friendly)
server.jvm.additional=-XX:+UseG1GC
server.jvm.additional=-XX:+ParallelRefProcEnabled
server.jvm.additional=-XX:MaxDirectMemorySize=512m
server.jvm.additional=-Djdk.tls.ephemeralDHKeySize=2048
