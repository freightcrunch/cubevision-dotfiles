# ╔══════════════════════════════════════════════════════════════════════╗
# ║  picom.conf — Jetson Orin Nano (lightweight, low GPU overhead)       ║
# ║  Install to: ~/.config/picom/picom.conf                             ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── Backend ───────────────────────────────────────────────────────────
# Use xrender on Jetson — glx can be heavy on shared GPU memory
backend = "xrender";

# ── VSync ─────────────────────────────────────────────────────────────
vsync = true;

# ── Shadow ────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 8;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.4;

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c",
];

# ── Fading ────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 5;

fade-exclude = [];

# ── Opacity ───────────────────────────────────────────────────────────
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'Rofi'",
];

opacity-rule = [
    "95:class_g = 'Alacritty'",
    "90:class_g = 'Thunar' && focused",
    "85:class_g = 'Thunar' && !focused",
];

# ── Rounded corners ──────────────────────────────────────────────────
corner-radius = 6;

rounded-corners-exclude = [
    "class_g = 'Polybar'",
];

# ── General ───────────────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";

# ── Window type settings ─────────────────────────────────────────────
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
