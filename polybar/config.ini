; ╔══════════════════════════════════════════════════════════════════════╗
; ║  polybar/config.ini — Jetson Orin Nano  (1920×1080)                  ║
; ║  Install to: ~/.config/polybar/config.ini                            ║
; ╚══════════════════════════════════════════════════════════════════════╝

; ── Colors ────────────────────────────────────────────────────────────
[colors]
background     = #282a36
background-alt = #44475a
foreground     = #f8f8f2
primary        = #bd93f9
secondary      = #ff79c6
alert          = #ff5555
disabled       = #6272a4
green          = #50fa7b
cyan           = #8be9fd
orange         = #ffb86c
yellow         = #f1fa8c

; ── Main bar ──────────────────────────────────────────────────────────
[bar/main]
width = 100%
height = 26pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "monospace:size=10;2"
font-1 = "monospace:size=10:weight=bold;2"

modules-left = bspwm
modules-center = date
modules-right = cpu memory temperature network pulseaudio

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = bspwm

; ── bspwm workspaces ──────────────────────────────────────────────────
[module/bspwm]
type = internal/bspwm

label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-occupied = %index%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %index%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

; ── CPU (6-core ARM) ──────────────────────────────────────────────────
[module/cpu]
type = internal/cpu
interval = 3
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

; ── Memory (8 GB) ─────────────────────────────────────────────────────
[module/memory]
type = internal/memory
interval = 5
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

; ── Temperature (Jetson thermal zone) ─────────────────────────────────
[module/temperature]
type = internal/temperature
interval = 5
thermal-zone = 0
base-temperature = 30
warn-temperature = 70

format = <label>
format-prefix = "TMP "
format-prefix-foreground = ${colors.primary}

format-warn = <label-warn>
format-warn-prefix = "TMP "
format-warn-prefix-foreground = ${colors.alert}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

; ── Network ───────────────────────────────────────────────────────────
[module/network]
type = internal/network
; Change to your interface (check: ip link)
interface-type = wired
interval = 5

format-connected-prefix = "NET "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %local_ip%

format-disconnected-prefix = "NET "
format-disconnected-prefix-foreground = ${colors.alert}
label-disconnected = down

; ── Audio ──────────────────────────────────────────────────────────────
[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

; ── Date / Time ───────────────────────────────────────────────────────
[module/date]
type = internal/date
interval = 30

date = %a %b %d
time = %H:%M

label = %date%  %time%
label-foreground = ${colors.foreground}

; ── Global WM settings ────────────────────────────────────────────────
[settings]
screenchange-reload = true
pseudo-transparency = true

[global/wm]
margin-top = 0
margin-bottom = 0
