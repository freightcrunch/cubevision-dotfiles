# ╔══════════════════════════════════════════════════════════════════════╗
# ║  pyproject.toml template — copy into new Python projects            ║
# ╚══════════════════════════════════════════════════════════════════════╝

[project]
name = "my-project"
version = "0.1.0"
requires-python = ">=3.10"
description = ""
readme = "README.md"
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
    "pytest-cov",
    "mypy",
]
ml = [
    # On Jetson: install PyTorch/TorchVision from NVIDIA wheels, not PyPI.
    # See: scripts/setup-pytorch-jetson.sh
    "numpy",
    "pillow",
    "matplotlib",
    "tqdm",
]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
