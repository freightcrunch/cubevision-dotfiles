# ╔══════════════════════════════════════════════════════════════════════╗
# ║  ranger — rc.conf                                                    ║
# ║  Install to: ~/.config/ranger/rc.conf                                ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── General ───────────────────────────────────────────────────────────
set viewmode miller
set column_ratios 1,3,4
set hidden_filter ^\.|\.(?:pyc|pyo|bak|swp|swo)$|^lost\+found$|^__(py)?cache__$
set show_hidden true
set confirm_on_delete multiple
set preview_files true
set preview_directories true
set collapse_preview true
set use_preview_script true
set preview_script ~/.config/ranger/scope.sh
set automatically_count_files true

# ── UI ────────────────────────────────────────────────────────────────
set draw_borders both
set dirname_in_tabs true
set status_bar_on_top false
set tilde_in_titlebar true
set max_history_size 50
set max_console_history_size 100
set unicode_ellipsis true
set padding_right true

# ── Sorting ───────────────────────────────────────────────────────────
set sort natural
set sort_reverse false
set sort_case_insensitive true
set sort_directories_first true
set sort_unicode false

# ── VCS integration (git, etc.) ───────────────────────────────────────
set vcs_aware true
set vcs_backend_git enabled
set vcs_backend_hg disabled
set vcs_backend_bzr disabled
set vcs_backend_svn disabled

# ── Preview images (w3m or kitty/iterm2/sixel) ───────────────────────
set preview_images true
set preview_images_method w3m

# ── Mouse ─────────────────────────────────────────────────────────────
set mouse_enabled true

# ── Bookmarks ─────────────────────────────────────────────────────────
set autosave_bookmarks true
set save_backtick_bookmark true

# ── Line numbers ──────────────────────────────────────────────────────
set line_numbers relative

# ── Keybindings ───────────────────────────────────────────────────────

# Navigation
map J move down=5
map K move up=5

# Tabs
map <C-n> tab_new
map <C-w> tab_close
map <TAB> tab_move 1
map <S-TAB> tab_move -1

# Bulk rename
map cw eval fm.execute_console("bulkrename") if fm.thisdir.marked_items else fm.open_console("rename ")

# Create directory / file
map mkd console mkdir%space
map mkf console touch%space

# Trash (move to ~/.local/share/Trash instead of permanent delete)
map dD shell -s trash-put %s 2>/dev/null || mv %s ~/.local/share/Trash/files/

# Toggle hidden
map zh set show_hidden!

# Flat view (show all files recursively)
map zf set flat_level!

# Quick shell access
map S shell $SHELL

# fzf integration
map <C-f> fzf_select
