# ╔══════════════════════════════════════════════════════════════════════╗
# ║  ranger — rifle.conf (file opener rules)                             ║
# ║  Install to: ~/.config/ranger/rifle.conf                             ║
# ╚══════════════════════════════════════════════════════════════════════╝
# Rules are evaluated top-to-bottom; first match wins.
# Conditions: ext, mime, name, path, has, env, file, directory, terminal, flag

# ── Text / code ───────────────────────────────────────────────────────
mime ^text, label editor = ${VISUAL:-$EDITOR} -- "$@"
mime ^text, label pager  = "$PAGER" -- "$@"
ext x?html?, label browser = $BROWSER -- "$@"
ext x?html?, label editor  = ${VISUAL:-$EDITOR} -- "$@"

# Source code / config
ext rs|toml|py|js|ts|jsx|tsx|json|yaml|yml|md|sh|bash|zsh|conf|cfg|ini|nix|lock, label editor = ${VISUAL:-$EDITOR} -- "$@"

# ── Images ────────────────────────────────────────────────────────────
mime ^image/svg, has inkscape, X, flag f = inkscape -- "$@"
mime ^image/svg, has display,  X, flag f = display -- "$@"
mime ^image, has feh,     X, flag f = feh -- "$@"
mime ^image, has eog,     X, flag f = eog -- "$@"
mime ^image, has gimp,    X, flag f = gimp -- "$@"
ext xcf, has gimp, X, flag f = gimp -- "$@"

# ── Video / Audio ─────────────────────────────────────────────────────
mime ^video, has mpv,     X, flag f = mpv -- "$@"
mime ^video, has vlc,     X, flag f = vlc -- "$@"
mime ^audio|ogg$, has mpv,     terminal = mpv -- "$@"
mime ^audio|ogg$, has vlc,     X, flag f = vlc -- "$@"

# ── Documents ─────────────────────────────────────────────────────────
ext pdf, has zathura, X, flag f = zathura -- "$@"
ext pdf, has evince,  X, flag f = evince -- "$@"
ext pdf, has xdg-open, X, flag f = xdg-open -- "$@"

ext docx?|xlsx?|pptx?|odt|ods|odp, has libreoffice, X, flag f = libreoffice "$@"

# ── Archives ──────────────────────────────────────────────────────────
ext 7z|ace|ar|arc|bz2?|cab|cpio|cpt|deb|dgc|dmg|gz|iso|jar|msi|pkg|rar|shar|tar|tgz|xar|xpi|xz|zip, has atool = atool --list -- "$@"
ext 7z|ace|ar|arc|bz2?|cab|cpio|cpt|deb|dgc|dmg|gz|iso|jar|msi|pkg|rar|shar|tar|tgz|xar|xpi|xz|zip, has atool = atool --extract -- "$@"

# ── Fallback ──────────────────────────────────────────────────────────
mime ^text, label editor = ${VISUAL:-$EDITOR} -- "$@"
              !mime ^text, label editor, ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php|toml|yaml|yml = ${VISUAL:-$EDITOR} -- "$@"
label open, has xdg-open = xdg-open -- "$@"
