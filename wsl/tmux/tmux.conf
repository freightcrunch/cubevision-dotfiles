# ╔══════════════════════════════════════════════════════════════════════╗
# ║  tmux.conf — WSL2 · Nordic Night                                    ║
# ║  Prefix: Ctrl+a                                                      ║
# ╚══════════════════════════════════════════════════════════════════════╝

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Pane Splitting ---
# Vertical split: prefix + =
unbind %
bind = split-window -h -c "#{pane_current_path}"

# Horizontal split: prefix + -
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# --- Pane Navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane Resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Windows ---
bind c new-window -c "#{pane_current_path}"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g status-interval 5

# --- Copy Mode (vi) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Reload Config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Nordic Night Status Bar ──────────────────────────────────────────
# bg=#121212 (Nordic Night dark), fg=#D8DEE9 (nord4), accent=#81A1C1 (nord9)
set -g status-position bottom
set -g status-style "bg=#121212,fg=#D8DEE9"
set -g status-left "#[fg=#81A1C1,bg=#1a1a2e,bold]  #S #[fg=#1a1a2e,bg=#121212] "
set -g status-right "#[fg=#4C566A] %H:%M  %d-%b "
set -g status-left-length 30
set -g status-right-length 30
setw -g window-status-format "#[fg=#4C566A] #I:#W "
setw -g window-status-current-format "#[fg=#81A1C1,bold] #I:#W "

# ── Nordic Night Pane Borders ────────────────────────────────────────
set -g pane-border-style "fg=#2E3440"
set -g pane-active-border-style "fg=#81A1C1"

# ── Nordic Night Message / Command ───────────────────────────────────
set -g message-style "bg=#1a1a2e,fg=#EBCB8B"
set -g message-command-style "bg=#1a1a2e,fg=#81A1C1"

# ── Nordic Night Copy Mode ───────────────────────────────────────────
setw -g mode-style "bg=#3B4252,fg=#ECEFF4"

# ── Nordic Night Clock ───────────────────────────────────────────────
setw -g clock-mode-colour "#81A1C1"
